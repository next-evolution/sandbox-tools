components:
  schemas:
    UserUpdateRequest:
      type: object
      properties:
        nickName:
          type: string
          description: ニックネーム
          example: Mr. Consideration
          maxLength: 50
          minLength: 0
      required:
      - nickName
    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID(Number)
          example: 999
        userId:
          type: string
          description: ユーザID(Cognito sub)
          example: 1aaaaaa1-2bb2-3cc3-4dd4-5eeeeeeeeee5
        emailAddress:
          type: string
          description: email
          example: account@domain.com
        nickName:
          type: string
          description: nickname
          example: Mr. Consideration
        approved:
          type: boolean
          description: 承認フラグ
        approvedAt:
          type: string
          format: date-time
          description: 承認日時
          example: 2026-01-23T12:34:56+09:00
        admin:
          type: boolean
          description: 管理者フラグ
        blocked:
          type: boolean
          description: auth0 blocked
        createdAt:
          type: string
          format: date-time
          description: 新規登録日時
          example: 2026-01-23T12:34:56+09:00
        updatedAt:
          type: string
          format: date-time
          description: 更新日時
          example: 2026-01-23T12:34:56+09:00
      required:
      - admin
      - approved
      - blocked
      - createdAt
      - emailAddress
      - id
      - nickName
      - userId
    UserResponse:
      type: object
      properties:
        returnCode:
          type: integer
          format: int32
          description: 処理結果
        message:
          type: string
          description: message
        user:
          $ref: "#/components/schemas/UserDto"
          description: ユーザー情報
      required:
      - returnCode
    SymbolDto:
      type: object
      properties:
        symbol:
          type: string
          description: symbol
          example: USDJPY
        symbolType:
          type: string
          description: symbol
          example: Trade|Analyze
        name:
          type: string
          description: name
          example: ドル円
        validScale:
          type: integer
          format: int32
          description: scale
          example: 3
        targetVolatility:
          type: number
          description: targetVolatility
          example: 0.005
        sortOrder:
          type: integer
          format: int32
          description: sortOrder
          example: 100
      required:
      - name
      - sortOrder
      - symbol
      - symbolType
      - targetVolatility
      - validScale
    SymbolRequest:
      type: object
      properties:
        symbol:
          $ref: "#/components/schemas/SymbolDto"
      required:
      - symbol
    SummerTimeDto:
      type: object
      properties:
        targetYear:
          type: integer
          format: int32
          description: 対象年
        applyStart:
          type: string
          format: date
          description: 適用開始日
          example: 2026-01-23
        applyEnd:
          type: string
          format: date
          description: 適用終了日
          example: 2026-01-23
      required:
      - applyEnd
      - applyStart
      - targetYear
    SummerTimeRequest:
      type: object
      properties:
        summerTime:
          $ref: "#/components/schemas/SummerTimeDto"
      required:
      - summerTime
    EconomicIndicatorDto:
      type: object
      properties:
        code:
          type: string
          description: 経済指標コード
          example: CPI_YOY
        countryCode:
          type: string
          description: 国コード
          example: JP
        name:
          type: string
          description: 指標名
        importance:
          type: string
          description: 重要度
          enum:
          - H
          - M
          - X
          - Z
        description:
          type: string
          description: 説明
        unitOfValue:
          type: string
          description: 単位
        countryName:
          type: string
          description: 国名
        countryNameShort:
          type: string
          description: 国名略称
      required:
      - code
      - countryCode
      - importance
      - name
    EconomicIndicatorRequest:
      type: object
      properties:
        indicator:
          $ref: "#/components/schemas/EconomicIndicatorDto"
      required:
      - indicator
    EconomicIndicatorDataDto:
      type: object
      properties:
        code:
          type: string
          description: 経済指標コード
          example: CPI_YOY
        countryCode:
          type: string
          description: 国コード
          example: JP
        name:
          type: string
          description: 指標名
        importance:
          type: string
          description: 重要度
        description:
          type: string
          description: 説明
        publication:
          type: string
          format: date-time
          description: 発表日時
          example: 2026-01-23T12:34:56+09:00
        publicationDate:
          type: string
          description: 発表日
        publicationTime:
          type: string
